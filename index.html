  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Quiz App</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(to right,#4facfe,#00f2fe);
        margin:0;
        padding:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .quiz-container{
        background:white;
        width:450px;
        padding:25px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,0.3);
    }

    h1{
        text-align:center;
        color:#333;
    }

    #subject-select{
        width:100%;
        padding:10px;
        margin-bottom:20px;
        border-radius:8px;
        border:1px solid #ccc;
        font-size:16px;
    }

    .question{
        font-size:20px;
        margin-bottom:15px;
        color:#222;
    }

    .option{
        background:#f1f1f1;
        padding:10px;
        margin:8px 0;
        border-radius:8px;
        cursor:pointer;
        transition:0.3s;
    }

    .option:hover{
        background:#dbeafe;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:15px;
        border:none;
        border-radius:8px;
        background:#007bff;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    #result{
        text-align:center;
        font-size:22px;
        font-weight:bold;
        margin-top:20px;
        color:green;
    }
</style>
</head>

<body>

<div class="quiz-container">
    <h1>Science Quiz App</h1>

    <select id="subject-select">
        <option value="physics">Physics</option>
        <option value="math">Mathematics</option>
        <option value="biology">Biology</option>
        <option value="chemistry">Chemistry</option>
    </select>

    <div id="quiz">
        <div class="question" id="question">Question text</div>
        <div id="options"></div>
        <button onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="result"></div>
</div>

<script>

const quizzes = {

physics: [
{
question: "What is the SI unit of force?",
options: ["Newton", "Joule", "Pascal", "Watt"],
answer: "Newton"
},
{
question: "Speed = ?",
options: ["Distance × Time", "Distance / Time", "Mass × Velocity", "Force / Area"],
answer: "Distance / Time"
}
],

math: [
{
question: "What is 12 × 8?",
options: ["96", "88", "108", "86"],
answer: "96"
},
{
question: "Value of π approximately?",
options: ["2.14", "3.14", "4.13", "1.34"],
answer: "3.14"
}
],

biology: [
{
question: "What organ pumps blood?",
options: ["Liver", "Brain", "Heart", "Lungs"],
answer: "Heart"
},
{
question: "Plants make food by?",
options: ["Respiration", "Photosynthesis", "Digestion", "Excretion"],
answer: "Photosynthesis"
}
],

chemistry: [
{
question: "Chemical symbol of water?",
options: ["O2", "CO2", "H2O", "NaCl"],
answer: "H2O"
},
{
question: "pH less than 7 means?",
options: ["Neutral", "Basic", "Acidic", "Salt"],
answer: "Acidic"
}
]

};

let currentQuestion = 0;
let score = 0;
let selectedSubject = "physics";

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const resultEl = document.getElementById("result");
const subjectSelect = document.getElementById("subject-select");

subjectSelect.addEventListener("change", () => {
    selectedSubject = subjectSelect.value;
    currentQuestion = 0;
    score = 0;
    resultEl.innerHTML = "";
    loadQuestion();
});

function loadQuestion(){

    const quiz = quizzes[selectedSubject];
    const q = quiz[currentQuestion];

    questionEl.innerText = q.question;
    optionsEl.innerHTML = "";

    q.options.forEach(option => {

        const div = document.createElement("div");
        div.classList.add("option");
        div.innerText = option;

        div.onclick = () => {
            if(option === q.answer){
                score++;
            }

            Array.from(optionsEl.children).forEach(btn=>{
                btn.style.pointerEvents = "none";
            });

            div.style.background = "#90ee90";
        };

        optionsEl.appendChild(div);
    });
}

function nextQuestion(){

    currentQuestion++;

    if(currentQuestion < quizzes[selectedSubject].length){
        loadQuestion();
    } else {
        document.getElementById("quiz").innerHTML = "";
        resultEl.innerHTML = 
        "You scored " + score + " out of " + quizzes[selectedSubject].length;
    }
}

loadQuestion();

</script>

</body>
</html>
